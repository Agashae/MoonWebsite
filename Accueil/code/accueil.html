Cette image est une œuvre célèbre intitulée "The Hunt for Artemis". Elle est le fruit d'une collaboration entre deux astrophotographes de renom, Andrew McCarthy et Connor Matherne.Voici quelques détails fascinants sur cette photographie :Prouesse technique : L'image finale est un composite haute résolution de 174 mégapixels. Elle a nécessité la capture de plus de 250 000 clichés individuels.Répartition des rôles : Andrew McCarthy s'est concentré sur la capture des détails de la surface (environ 200 000 photos noir et blanc), tandis que Connor Matherne s'est chargé des données de couleur (environ 50 000 photos).Couleurs minérales : Bien que la saturation soit augmentée pour être visible par l'œil humain, ces teintes sont réelles et reflètent la composition minérale de la Lune.Les zones bleues indiquent une forte concentration de titane.Les tons rouges et oranges révèlent la présence de fer et de feldspath.Signification : Elle a été publiée en 2022 comme un hommage à la mission Artemis I de la NASA.
